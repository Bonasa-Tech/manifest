{
	"override_base_config": "base.conf",
	"msg": "Manifest seat pubkey integrity rules",
	"rule": [
		// The trader pubkey stored in a claimed seat is written by claim_seat
		// and never mutated while the seat is held. Discharges the seat-pubkey
		// assumption the global matching rules rely on.
		"rule_claim_seat_writes_trader_pubkey",
		"rule_seat_pubkey_preserved_by_deposit",
		"rule_seat_pubkey_preserved_by_withdraw",
		"rule_seat_pubkey_preserved_by_matching_bid",
		"rule_seat_pubkey_preserved_by_matching_ask",
		"rule_seat_pubkey_preserved_by_rest_remaining_bid",
		"rule_seat_pubkey_preserved_by_rest_remaining_ask",
		"rule_seat_pubkey_preserved_by_cancel_bid",
		"rule_seat_pubkey_preserved_by_cancel_ask",
		"rule_seat_pubkey_preserved_by_release_seat",

		// The same preservation induction over the global-specific code paths
		// (try_to_reduce_global_tokens, remove_from_global, try_to_add_to_global,
		// transfer_global_tokens).
		"rule_seat_pubkey_preserved_by_matching_global_bid",
		"rule_seat_pubkey_preserved_by_matching_global_ask",
		"rule_seat_pubkey_preserved_by_cancel_global_bid",
		"rule_seat_pubkey_preserved_by_cancel_global_ask",
		"rule_seat_pubkey_preserved_by_rest_remaining_global_bid",
		"rule_seat_pubkey_preserved_by_rest_remaining_global_ask"
   ],
}
