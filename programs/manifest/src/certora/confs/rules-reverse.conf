{
	"override_base_config": "base.conf",
	"msg": "Manifest reverse order rules",
	"rule": [
		// Reverse and reverse-tight orders come back onto the other side of
		// the book when they are filled, and keep the funds invariant on the
		// way round.
		"rule_reverse_taker_no_funds_loss_bid",
		"rule_reverse_taker_no_funds_loss_ask",
		"rule_reverse_maker_no_funds_loss_bid",
		"rule_reverse_maker_no_funds_loss_ask",
		"rule_reverse_tight_maker_no_funds_loss_bid",
		"rule_reverse_tight_maker_no_funds_loss_ask",
		"rule_reverse_coalesce_bid",
		"rule_reverse_coalesce_ask",
		"rule_reverse_tight_coalesce_bid",
		"rule_reverse_tight_coalesce_ask",

		// No unexpected reverts on the coalesce path.
		"rule_reverse_coalesce_no_revert_bid",
		"rule_reverse_coalesce_no_revert_ask"
   ],
}
