{
	"override_base_config": "base.conf",
	"msg": "Manifest global order rules",
	"rule": [
		// Global orders. Funds for these come from the global vault instead of
		// the market vault, so they get their own no loss of funds property.
		"rule_place_single_order_global_full_match_bid",
		"rule_place_single_order_global_full_match_ask",
		"rule_place_single_order_global_partial_match_bid",
		"rule_place_single_order_global_partial_match_ask",
		"rule_place_single_order_global_unbacked_bid",
		"rule_place_single_order_global_unbacked_ask",
		"rule_rest_remaining_global_bid",
		"rule_rest_remaining_global_ask",
		"rule_cancel_global_order_bid",
		"rule_cancel_global_order_ask",
		"rule_global_deposit",
		"rule_global_withdraw",
		"rule_global_evict",
		"rule_global_evict_processor",
		"rule_global_evict_processor_with_fee",

		// Token-2022 transfer fees: the global vault receives less than
		// requested and the depositor is credited the received amount, never
		// the requested one.
		"rule_global_deposit_with_fee",

		// The seat-pubkey preservation induction over the global-specific code
		// paths (try_to_reduce_global_tokens, remove_from_global,
		// try_to_add_to_global, transfer_global_tokens).
		"rule_seat_pubkey_preserved_by_matching_global_bid",
		"rule_seat_pubkey_preserved_by_matching_global_ask",
		"rule_seat_pubkey_preserved_by_cancel_global_bid",
		"rule_seat_pubkey_preserved_by_cancel_global_ask",
		"rule_seat_pubkey_preserved_by_rest_remaining_global_bid",
		"rule_seat_pubkey_preserved_by_rest_remaining_global_ask",

		// Gas prepayments for global orders are lamports, not tokens, and get
		// their own conservation rules.
		"rule_global_gas_prepayment",
		"rule_cancel_global_order_gas_refund_bid",
		"rule_cancel_global_order_gas_refund_ask",

		// Global takers never take.
		"rule_global_taker_cannot_take_bid",
		"rule_global_taker_cannot_take_ask",

		// No unexpected reverts on the global paths.
		"rule_place_single_order_global_no_revert_bid",
		"rule_place_single_order_global_no_revert_ask",
		"rule_cancel_global_order_no_revert_bid",
		"rule_cancel_global_order_no_revert_ask",
		"rule_rest_remaining_global_no_revert_bid",
		"rule_rest_remaining_global_no_revert_ask",
		"rule_global_deposit_no_revert",
		"rule_global_withdraw_no_revert"
   ],
}
