name: Certora Formal Verification
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
jobs:
  # Standard verification - rules.conf
  verify_rules:
    name: Verify Standard Rules
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Submit rules verification job
        uses: Certora/certora-run-action@v1
        with:
          configurations: rules.conf
          job-name: "manifest rules"
          ecosystem: solana
          working-directory: programs/manifest/src/certora/confs
          certora-key: ${{ secrets.CERTORAKEY }}
          cli-version: "8.11.3"
          certora-sbf-options: "-vvv --tools-version=v1.43"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Standard verification - hypertree.conf
  verify_hypertree:
    name: Verify Hypertree Rules
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Submit hypertree verification job
        uses: Certora/certora-run-action@v1
        with:
          configurations: hypertree.conf
          job-name: "manifest hypertree rules"
          ecosystem: solana
          working-directory: programs/manifest/src/certora/confs
          certora-key: ${{ secrets.CERTORAKEY }}
          cli-version: "8.11.3"
          certora-sbf-options: "-vvv --tools-version=v1.43"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Verification with optimizations enabled
  verify_optimized:
    name: Verify Optimized Rules
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Submit optimized verification jobs
        uses: Certora/certora-run-action@v1
        with:
          configurations: |-
            hypertree_opt.conf
          job-name: "manifest optimized rules"
          ecosystem: solana
          working-directory: programs/manifest/src/certora/confs
          certora-key: ${{ secrets.CERTORAKEY }}
          cli-version: "8.11.3"
          certora-sbf-options: "-vvv --tools-version=v1.43"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
