name: Code Review - Rust
on:
  push:
    branches: ['main']
  pull_request:
    paths:
      [
        'programs/**',
        'client/rust/**',
        'lib/**',
        'Cargo.toml',
        'Cargo.lock',
      ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  SOLANA_VERSION: '2.2.20'
  SVM_ARCH: 'v2'
  RUST_TOOLCHAIN: '1.86.0'

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Rust version
        run: |
          rustup toolchain install ${{ env.RUST_TOOLCHAIN }}
          rustup component add rustfmt

      - name: Run fmt
        run: cargo fmt -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "solana-${{ env.SOLANA_VERSION }}"

      - name: Set Rust version
        run: |
          rustup toolchain install ${{ env.RUST_TOOLCHAIN }}
          rustup component add clippy

      - name: Run clippy
        run: cargo clippy --workspace --exclude fixed --exclude checked_math -- --no-deps --deny=warnings --allow=clippy::style --allow=clippy::complexity --allow=clippy::manual-retain --allow=clippy::crate-in-macro-def --allow=clippy::result-large-err --allow=clippy::derive_partial_eq_without_eq --allow=clippy::multiple-bound-locations --allow=unexpected-cfgs

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "solana-${{ env.SOLANA_VERSION }}"

      - name: Set Rust version
        run: |
          rustup toolchain install ${{ env.RUST_TOOLCHAIN }}

      - name: Install Solana
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
          export PATH="/home/runner/.local/share/solana/install/active_release/bin:$PATH"
          solana --version
          echo "Generating keypair..."
          solana-keygen new -o "$HOME/.config/solana/id.json" --no-passphrase --silent

      - name: Build all deps
        run: |
          cargo build-sbf --arch=${{ env.SVM_ARCH }} -- -p manifest-dex -p wrapper -p ui-wrapper
          cargo build-sbf --arch=${{ env.SVM_ARCH }} -- -p manifest-dex

      - name: Run sbf tests
        run: cargo test-sbf --arch=${{ env.SVM_ARCH }} --features "test,test-sbf" -- --test-threads 1

  test-feature-combinations:
    name: Test Feature Combination (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            features: ''
            test_features: 'test,test-sbf'
          - name: opt-unsafe
            features: 'opt-unsafe'
            test_features: 'test,test-sbf,opt-unsafe'
          - name: opt-asm
            features: 'opt-asm'
            test_features: 'test,test-sbf,opt-asm'
          - name: opt-full
            features: 'opt-full'
            test_features: 'test,test-sbf,opt-full'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "solana-${{ env.SOLANA_VERSION }}-opt"

      - name: Set Rust version
        run: |
          rustup toolchain install ${{ env.RUST_TOOLCHAIN }}

      - name: Install Solana
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
          export PATH="/home/runner/.local/share/solana/install/active_release/bin:$PATH"
          solana --version
          echo "Generating keypair..."
          solana-keygen new -o "$HOME/.config/solana/id.json" --no-passphrase --silent

      - name: Run hypertree tests
        run: |
          if [ -n "${{ matrix.features }}" ]; then
            cargo test -p hypertree --features "${{ matrix.features }}"
          else
            cargo test -p hypertree
          fi

      - name: Build all programs
        run: |
          if [ -n "${{ matrix.features }}" ]; then
            cargo build-sbf --arch=${{ env.SVM_ARCH }} -- -p manifest-dex -p wrapper -p ui-wrapper --features "${{ matrix.features }}"
            cargo build-sbf --arch=${{ env.SVM_ARCH }} -- -p manifest-dex --features "${{ matrix.features }}"
          else
            cargo build-sbf --arch=${{ env.SVM_ARCH }} -- -p manifest-dex -p wrapper -p ui-wrapper
            cargo build-sbf --arch=${{ env.SVM_ARCH }} -- -p manifest-dex
          fi

      - name: Run sbf tests
        run: cargo test-sbf --arch=${{ env.SVM_ARCH }} --features "${{ matrix.test_features }}" -- --test-threads 1

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "solana-${{ env.SOLANA_VERSION }}"

      - name: Set Rust version
        run: |
          rustup toolchain install ${{ env.RUST_TOOLCHAIN }}

      - name: Install Solana
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
          export PATH="/home/runner/.local/share/solana/install/active_release/bin:$PATH"
          solana --version
          echo "Generating keypair..."
          solana-keygen new -o "$HOME/.config/solana/id.json" --no-passphrase --silent

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      # split coverage test runs to avoid enabling no-clock feature during unit tests
      # and to handle packages with/without test features separately
      - name: Generate code coverage
        run: |
          cargo llvm-cov --no-report --workspace --exclude manifest-jupiter --exclude manifest-client --features test  -- --nocapture --test-threads 1
          cargo llvm-cov --no-report --package manifest-jupiter --features test  -- --nocapture --test-threads 1
          cargo llvm-cov --no-report --package manifest-client -- --nocapture --test-threads 1
          cargo llvm-cov report --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          verbose: true
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
